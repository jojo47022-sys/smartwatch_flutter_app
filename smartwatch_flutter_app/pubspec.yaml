name: smart_health_watch
description: A Smart Health Watch Monitoring App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  geolocator: ^10.1.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.0
  provider: ^6.1.1
  google_maps_flutter: ^2.5.0
  table_calendar: ^3.0.9
  firebase_core: ^4.7.0
  firebase_database: ^12.3.0
  firebase_auth: ^6.4.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/

